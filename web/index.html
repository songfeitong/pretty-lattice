<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <style>
      [data-startup-fallback] {
        box-sizing: border-box;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
        color: #282828;
        background: #fafafa;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }
      [data-startup-card] {
        box-sizing: border-box;
        width: min(560px, 100%);
        padding: 24px;
        border: 1px solid #e6e6e6;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 44px rgb(34 39 46 / 12%);
      }
      [data-startup-card] h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      [data-startup-card] p {
        margin: 0;
        color: #666;
        font-size: 14px;
        line-height: 1.55;
      }
      [data-startup-card] code {
        color: #282828;
      }
      @media (prefers-color-scheme: dark) {
        [data-startup-fallback] {
          color: #eee;
          background: #181818;
        }
        [data-startup-card] {
          border-color: #545454;
          background: #383838;
          box-shadow: none;
        }
        [data-startup-card] p {
          color: #b5b5b5;
        }
        [data-startup-card] code {
          color: #eee;
        }
      }
    </style>
    <script>
      (() => {
        const themeStorageKey = "pretty-lattice-theme";
        const motionStorageKey = "pretty-lattice-motion";
        let theme = "system";
        let motion = "system";

        try {
          const storedTheme = window.localStorage.getItem(themeStorageKey);
          if (storedTheme === "light" || storedTheme === "dark" || storedTheme === "system") {
            theme = storedTheme;
          }
          const storedMotion = window.localStorage.getItem(motionStorageKey);
          if (storedMotion === "reduce" || storedMotion === "full" || storedMotion === "system") {
            motion = storedMotion;
          }
        } catch {}

        const resolvedTheme =
          theme === "system"
            ? typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : theme;
        const root = document.documentElement;
        root.classList.toggle("dark", resolvedTheme === "dark");
        root.classList.toggle("light", resolvedTheme === "light");
        root.dataset.theme = resolvedTheme;
        root.style.colorScheme = resolvedTheme;
        root.dataset.motion =
          motion === "system"
            ? typeof window.matchMedia === "function" &&
              window.matchMedia("(prefers-reduced-motion: reduce)").matches
              ? "reduce"
              : "full"
            : motion;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <title>Pretty Lattice</title>
  </head>
  <body>
    <div id="root">
      <main data-startup-fallback>
        <section data-startup-card role="status">
          <h1 data-startup-title>Starting Pretty Lattice…</h1>
          <p data-startup-message>The local app is loading.</p>
          <noscript>
            <p>JavaScript is disabled. Enable it and reload this page.</p>
          </noscript>
        </section>
      </main>
    </div>
    <script>
      window.setTimeout(() => {
        const title = document.querySelector("[data-startup-title]");
        const message = document.querySelector("[data-startup-message]");
        if (!(title instanceof HTMLElement) || !(message instanceof HTMLElement)) return;

        title.textContent = "Pretty Lattice could not start";
        message.innerHTML =
          "A browser resource failed to load. Reload this page, or return to the terminal and restart with <code>prl --verbose</code>.";
        title.closest("[data-startup-card]")?.setAttribute("role", "alert");
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
